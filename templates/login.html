<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 — SysAdmin Wiki</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{background:#0d1117;min-height:100vh;display:flex;align-items:flex-start;
     justify-content:center;padding-top:6vh}
.login-box{background:#161b22;border:1px solid #30363d;border-radius:12px;
           padding:24px 28px;width:100%;max-width:340px}
.logo{font-size:1.4rem;color:#2dd4bf;margin-right:8px}
.brand{font-size:1.1rem;color:#e6edf3;font-weight:700;vertical-align:middle}
label{color:#c9d1d9;font-size:.8rem;font-weight:500}
.form-control,.form-select{background:#0d1117;border-color:#30363d;color:#e6edf3;
  font-size:.875rem}
.form-control:focus,.form-select:focus{background:#0d1117;border-color:#2dd4bf;
  color:#e6edf3;box-shadow:0 0 0 3px rgba(45,212,191,.15)}
.form-select option{background:#161b22;color:#e6edf3}
.btn-login{background:#2dd4bf;border:none;color:#0d1117;font-weight:600;
           width:100%;padding:8px;border-radius:6px;font-size:.9rem}
.btn-login:hover{background:#14b8a6;color:#0d1117}
.alert-danger{background:#3d1f1f;border-color:#6b2020;color:#fca5a5;
              font-size:.8rem;padding:6px 10px}
</style>
</head>
<body>
<div class="login-box">
  <div class="mb-3 d-flex align-items-center justify-content-center">
    <i class="bi bi-terminal-fill logo"></i>
    <span class="brand">Wiki</span>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-danger mb-2">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="post" action="{{ url_for('login') }}">
    <div class="mb-2">
      <label class="mb-1">账户</label>
      <select name="username" class="form-select form-select-sm">
        {% for u in users %}
        <option value="{{ u.username }}">{{ u.username }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="mb-1">密码</label>
      <input type="password" name="password" class="form-control form-control-sm"
             autocomplete="new-password" autofocus required>
    </div>
    {% if show_captcha %}
    <div class="mb-3">
      <label class="mb-1">验证码 &nbsp;<span style="color:#2dd4bf;font-weight:600;letter-spacing:.05em">{{ captcha_q }}</span></label>
      <input type="text" name="captcha" class="form-control form-control-sm"
             autocomplete="off" placeholder="输入计算结果" required>
    </div>
    {% endif %}
    <button type="submit" class="btn btn-login">登 录</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
